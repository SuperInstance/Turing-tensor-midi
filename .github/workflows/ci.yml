name: CI

on:
  push:
    branches: [main]
    paths:
      - 'Turing_Project/**'
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check Turing_Project/turing/ Turing_Project/tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd Turing_Project
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd Turing_Project
          pytest tests/ -v --tb=short
        env:
          ZAI_API_KEY: test-key
          DEEPINFRA_API_KEY: test-key
